<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VBS Class Finder – Illumination Station 2026</title>
<style>
  :root {
    --purple: #6B2FA0;
    --orange: #E8621A;
    --pink: #D4297A;
    --light: #F5F0FB;
    --border: #DDD;
    --row-odd: #fff;
    --row-even: #F9F5FD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0eaf8; color: #222; }

  header {
    background: var(--purple);
    color: #fff;
    padding: 14px 16px 10px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .3px; }
  header p { font-size: .75rem; opacity: .8; margin-top: 1px; }

  .search-bar {
    padding: 10px 12px;
    background: var(--purple);
  }
  .search-bar input {
    width: 100%; padding: 10px 14px;
    border: none; border-radius: 8px;
    font-size: 1rem; outline: none;
    background: rgba(255,255,255,0.95);
  }

  .tabs {
    display: flex; background: #fff;
    border-bottom: 2px solid var(--purple);
    overflow-x: auto; white-space: nowrap;
  }
  .tab-btn {
    padding: 10px 16px; font-size: .85rem; font-weight: 600;
    border: none; background: transparent; cursor: pointer;
    color: #666; flex-shrink: 0;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }

  .content { padding: 12px; }

  /* Grade cards */
  .grade-list { display: flex; flex-direction: column; gap: 8px; }
  .grade-card {
    background: #fff; border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
    overflow: hidden;
  }
  .grade-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; cursor: pointer;
    background: var(--purple); color: #fff;
    font-weight: 700; font-size: .95rem;
  }
  .grade-header .chevron { transition: transform .2s; font-size: .8rem; }
  .grade-header.open .chevron { transform: rotate(180deg); }
  .class-list { display: none; flex-direction: column; }
  .class-list.open { display: flex; }
  .class-item {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    background: #fff;
    transition: background .15s;
  }
  .class-item:last-child { border-bottom: none; }
  .class-item:hover, .class-item:active { background: var(--light); }
  .class-item .class-name { font-weight: 600; font-size: .9rem; color: #222; }
  .class-item .class-room { font-size: .8rem; color: #888; margin-top: 1px; }
  .class-item .arrow { color: var(--purple); font-size: .85rem; }

  /* Schedule detail */
  .schedule-view { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.1); overflow: hidden; }
  .schedule-header {
    background: var(--orange); color: #fff;
    padding: 12px 14px;
  }
  .schedule-header h2 { font-size: 1rem; font-weight: 700; }
  .schedule-header p { font-size: .8rem; opacity: .9; margin-top: 2px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 10px;
    padding: 7px 12px; background: var(--purple); color: #fff;
    border: none; border-radius: 8px; font-size: .85rem; font-weight: 600;
    cursor: pointer;
  }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--light); padding: 8px 10px;
    font-size: .78rem; text-transform: uppercase; letter-spacing: .5px;
    color: var(--purple); text-align: left; border-bottom: 2px solid var(--border);
  }
  tbody tr:nth-child(odd) { background: var(--row-odd); }
  tbody tr:nth-child(even) { background: var(--row-even); }
  tbody td { padding: 9px 10px; font-size: .88rem; border-bottom: 1px solid #eee; vertical-align: top; }
  tbody td:first-child { font-weight: 600; white-space: nowrap; color: #444; }
  .travel-row td { color: #aaa; font-style: italic; font-size: .82rem; }
  .highlight-activity { background: #FFF3E0 !important; }

  /* Search results */
  .search-results { display: flex; flex-direction: column; gap: 8px; }
  .result-item {
    background: #fff; border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    transition: background .15s;
  }
  .result-item:hover { background: var(--light); }
  .result-label { font-weight: 600; font-size: .9rem; }
  .result-sub { font-size: .8rem; color: #888; margin-top: 2px; }

  /* Room view */
  .room-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .room-btn {
    padding: 7px 12px; border-radius: 20px; border: 2px solid var(--purple);
    background: #fff; color: var(--purple); font-size: .82rem; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .room-btn.active, .room-btn:hover { background: var(--purple); color: #fff; }

  .note-box {
    background: #FFF8E1; border-left: 4px solid #FFC107;
    padding: 8px 12px; font-size: .8rem; margin-top: 10px; border-radius: 0 6px 6px 0;
    color: #555;
  }
  .empty-state { text-align: center; padding: 32px 16px; color: #999; font-size: .95rem; }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: .72rem; font-weight: 700; margin-left: 6px; }
  .tag-grade { background: var(--light); color: var(--purple); }
</style>
</head>
<body>

<header>
  <h1>⚡ VBS Class Finder</h1>
  <p>Illumination Station 2026 · Burnt Hickory Baptist</p>
</header>
<div class="search-bar">
  <input type="search" id="searchInput" placeholder="Search class, room, or grade (e.g. C128, Twos, 3rd)…" autocomplete="off" />
</div>
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('browse')">Browse by Grade</button>
  <button class="tab-btn" onclick="showTab('rooms')">Room View</button>
</div>

<div class="content">
  <div id="searchResultsView" style="display:none">
    <button class="back-btn" onclick="clearSearch()">← Back</button>
    <div class="search-results" id="searchResultsList"></div>
  </div>
  <div id="scheduleDetailView" style="display:none">
    <button class="back-btn" id="backBtn" onclick="goBack()">← Back</button>
    <div class="schedule-view" id="scheduleContent"></div>
  </div>
  <div id="tabBrowse">
    <div class="grade-list" id="gradeList"></div>
  </div>
  <div id="tabRooms" style="display:none">
    <div class="room-selector" id="roomSelector"></div>
    <div id="roomScheduleContent"></div>
  </div>
</div>

// Build flat class list
const allClasses = GRADES.flatMap(g => g.classes);

// ============================================================
// UI STATE
// ============================================================
let currentView = 'browse'; // browse | rooms | search | detail
let previousView = 'browse';
let searchTimeout = null;

// ============================================================
// RENDER GRADE LIST
// ============================================================
function renderGradeList() {
  const container = document.getElementById('gradeList');
  container.innerHTML = '';
  GRADES.forEach(g => {
    const card = document.createElement('div');
    card.className = 'grade-card';
    const header = document.createElement('div');
    header.className = 'grade-header';
    header.style.background = g.color;
    header.innerHTML = `<span>${g.grade} <small style="opacity:.7;font-size:.75rem;">(${g.classes.length} class${g.classes.length>1?'es':''})</small></span><span class="chevron">▼</span>`;
    header.onclick = () => {
      header.classList.toggle('open');
      list.classList.toggle('open');
    };
    const list = document.createElement('div');
    list.className = 'class-list';
    g.classes.forEach(cls => {
      const item = document.createElement('div');
      item.className = 'class-item';
      item.innerHTML = `<div><div class="class-name">${cls.group}</div><div class="class-room">Room: ${cls.room}</div></div><span class="arrow">›</span>`;
      item.onclick = () => showSchedule(cls.id);
      list.appendChild(item);
    });
    card.appendChild(header);
    card.appendChild(list);
    container.appendChild(card);
  });
}

// ============================================================
// RENDER SCHEDULE DETAIL
// ============================================================
function showSchedule(classId, fromSearch) {
  const cls = allClasses.find(c => c.id === classId);
  if (!cls) return;

  previousView = fromSearch ? 'search' : currentView;
  currentView = 'detail';

  document.getElementById('backBtn').textContent = previousView === 'search' ? '← Back to Results' : '← Back';

  const rows = cls.schedule.map(s => {
    const isTravel = s.activity.toLowerCase().includes('travel');
    const rowClass = isTravel ? 'travel-row' : (
      ['worship rally','music','craft','rec','snack'].some(k => s.activity.toLowerCase().includes(k)) ? 'highlight-activity' : ''
    );
    return `<tr class="${rowClass}"><td>${s.time}</td><td>${s.activity}</td><td>${s.location}</td></tr>`;
  }).join('');

  document.getElementById('scheduleContent').innerHTML = `
    <div class="schedule-header">
      <h2>${cls.group}</h2>
      <p>Room: ${cls.room} &nbsp;·&nbsp; ${cls.grade}</p>
    </div>
    <table>
      <thead><tr><th>Time</th><th>Activity</th><th>Location</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${cls.notes ? `<div class="note-box">ℹ️ ${cls.notes}</div>` : ''}
  `;

  hideAllViews();
  document.getElementById('scheduleDetailView').style.display = 'block';
}

function goBack() {
  if (previousView === 'search') {
    currentView = 'search';
    hideAllViews();
    document.getElementById('searchResultsView').style.display = 'block';
  } else if (previousView === 'rooms') {
    showTab('rooms');
  } else {
    showTab('browse');
  }
}

// ============================================================
// SEARCH
// ============================================================
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if (!q) { clearSearch(); return; }
  searchTimeout = setTimeout(() => doSearch(q), 120);
});

function doSearch(q) {
  const lower = q.toLowerCase();
  const results = allClasses.filter(cls => {
    return cls.group.toLowerCase().includes(lower)
      || cls.room.toLowerCase().includes(lower)
      || cls.grade.toLowerCase().includes(lower)
      || cls.id.toLowerCase().includes(lower)
      || cls.schedule.some(s => s.location.toLowerCase().includes(lower) || s.activity.toLowerCase().includes(lower));
  });

  const list = document.getElementById('searchResultsList');
  if (results.length === 0) {
    list.innerHTML = '<div class="empty-state">No classes found for "' + q + '"</div>';
  } else {
    list.innerHTML = results.map(cls => `
      <div class="result-item" onclick="showSchedule('${cls.id}', true)">
        <div>
          <div class="result-label">${cls.group}</div>
          <div class="result-sub">Room: ${cls.room} · ${cls.grade}</div>
        </div>
        <span style="color:var(--purple)">›</span>
      </div>
    `).join('');
  }

  currentView = 'search';
  hideAllViews();
  document.getElementById('searchResultsView').style.display = 'block';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  showTab(previousView === 'rooms' ? 'rooms' : 'browse');
}

function renderRoomSelector() {
  const container = document.getElementById('roomSelector');
  container.innerHTML = ROOMS_WITH_SCHEDULES.map(r =>
    `<button class="room-btn" onclick="showRoomSchedule('${r}')" id="rbtn-${r.replace('/','_')}">${r}</button>`
  ).join('');
}

function showRoomSchedule(room) {
  // Highlight active
  document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('rbtn-' + room.replace('/','_'));
  if (btn) btn.classList.add('active');

  // Find all classes that use this room
  const matches = allClasses.filter(cls =>
    cls.room.includes(room) ||
    cls.schedule.some(s => s.location === room)
  );

  const el = document.getElementById('roomScheduleContent');
  if (matches.length === 0) {
    el.innerHTML = '<div class="empty-state">No schedule found for room ' + room + '</div>';
    return;
  }

  el.innerHTML = matches.map(cls => {
    const relevantRows = cls.schedule
      .filter(s => s.location === room || cls.room.includes(room))
      .map(s => `<tr><td>${s.time}</td><td>${s.activity}</td></tr>`)
      .join('');
    return `
      <div class="schedule-view" style="margin-bottom:10px">
        <div class="schedule-header" style="background:var(--purple)">
          <h2>${cls.group}</h2>
          <p>${cls.grade} · Home room: ${cls.room}</p>
        </div>
        <table>
          <thead><tr><th>Time</th><th>Activity in / for this room</th></tr></thead>
          <tbody>${cls.schedule.map(s => {
            const isHere = s.location === room || cls.room.includes(room);
            return `<tr ${isHere && s.location===room ? 'style="background:#E8F5E9"' : ''}><td style="font-weight:600;white-space:nowrap">${s.time}</td><td>${s.activity}${s.location && s.location!==room ? ' <span style="color:#aaa;font-size:.8rem">@ '+s.location+'</span>' : ''}</td></tr>`;
          }).join('')}</tbody>
        </table>
        <div style="padding:8px 12px;cursor:pointer;color:var(--purple);font-size:.85rem;font-weight:600" onclick="showSchedule('${cls.id}', false)">View full schedule →</div>
      </div>
    `;
  }).join('');
}

// ============================================================
// TABS
// ============================================================
function showTab(tabName) {
  currentView = tabName;
  hideAllViews();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (tabName === 'browse') {
    document.getElementById('tabBrowse').style.display = 'block';
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
  } else if (tabName === 'rooms') {
    document.getElementById('tabRooms').style.display = 'block';
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
  }
}

function hideAllViews() {
  document.getElementById('tabBrowse').style.display = 'none';
  document.getElementById('tabRooms').style.display = 'none';
  document.getElementById('searchResultsView').style.display = 'none';
  document.getElementById('scheduleDetailView').style.display = 'none';
}
